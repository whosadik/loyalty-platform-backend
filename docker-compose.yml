services:
  db:
    image: postgres:16
    container_name: loyalty_db
    environment:
      POSTGRES_DB: loyalty
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: loyalty
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: loyalty_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
