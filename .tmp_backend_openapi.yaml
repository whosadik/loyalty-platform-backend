            $ref: '#/components/schemas/PreviewItem'
      required:
      - assignment_id
      - items
    OfferPreviewResponse:
      type: object
      properties:
        ok:
          type: boolean
        assignment_id:
          type: integer
        offer:
          type: object
          additionalProperties: {}
        target:
          type: object
          additionalProperties: {}
        gross_total:
          type: string
        eligible_total:
          type: string
        discount_amount:
          type: string
        net_total:
          type: string
        estimated_points_earned:
          type: integer
      required:
      - assignment_id
      - discount_amount
      - eligible_total
      - estimated_points_earned
      - gross_total
      - net_total
      - offer
      - ok
      - target
