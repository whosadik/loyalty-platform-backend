components:
  schemas:
    BlankEnum:
      enum:
      - ''
    Campaign:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 64
        is_active:
          type: boolean
        priority:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        weekly_limit:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        weekly_spent:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        week_start_date:
          type: string
          format: date
          nullable: true
        allowed_categories: {}
        allowed_steps: {}
      required:
      - id
      - name
    CheckoutItem:
      type: object
      properties:
        product:
          type: integer
        quantity:
          type: integer
          minimum: 1
          default: 1
      required:
      - product
    CheckoutPreviewResponse:
      type: object
      properties:
        ok:
          type: boolean
        gross_total:
          type: string
        discount_amount:
          type: string
        net_total:
          type: string
        offer_applied:
          type: boolean
        applied_offer:
          type: object
          additionalProperties: {}
          nullable: true
        eligible_total:
          type: string
        estimated_points_earned:
          type: integer
        points_redeemed:
          type: integer
        balance_before:
          type: integer
        balance_after_estimated:
          type: integer
        tier:
          type: string
          nullable: true
      required:
      - applied_offer
      - balance_after_estimated
      - balance_before
      - discount_amount
      - eligible_total
      - estimated_points_earned
      - gross_total
      - net_total
      - offer_applied
      - ok
      - points_redeemed
      - tier
    CheckoutRequest:
      type: object
      properties:
        channel:
          type: string
          default: offline
        items:
          type: array
          items:
            $ref: '#/components/schemas/CheckoutItem'
        idempotency_key:
          type: string
        apply_assignment_id:
          type: integer
        redeem_points:
          type: integer
          minimum: 1
      required:
      - items
    OfferClickRequest:
      type: object
      properties:
        assignment_id:
          type: integer
        context: {}
      required:
      - assignment_id
    OfferPreviewRequest:
      type: object
      properties:
        assignment_id:
          type: integer
        items:
